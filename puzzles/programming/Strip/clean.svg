  <text x="70" y="350">Two identical rectangular pieces of paper are arranged to overlap each other by 5 cm.</text>
  <text x="70" y="370">One of the rectangles has been folded to make the structure above (not to scale).</text>
  <text x="70" y="390">The length of the whole arrangement is 75 cm.</text>
  <text x="70" y="418">What is the length of one of the pieces of paper?</text>
