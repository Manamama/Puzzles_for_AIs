interpretation_rules:

  arrangement_length:
    definition: >
      Distance between the extreme left and extreme right ends
      of the assembled configuration.

  fold:
    definition: >
      A fold may alter spatial orientation of portions of a piece
      without changing the total material length of that piece.

  overlap:
    definition: >
      Portions of the two pieces may occupy the same horizontal
      region while remaining distinct physical objects.

